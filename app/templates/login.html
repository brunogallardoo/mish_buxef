<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión – CampusRadar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900
             flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16
                  bg-blue-600 rounded-2xl shadow-xl mb-4">
        <i class="fa-solid fa-radar text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight">CampusRadar</h1>
      <p class="text-blue-300 text-sm mt-1">FCFM · Universidad de Chile</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h2 class="text-xl font-bold text-slate-800 mb-1">Bienvenido de vuelta</h2>
      <p class="text-slate-500 text-sm mb-6">Ingresa para acceder a la plataforma</p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3
                  text-sm mb-4 flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation text-red-500"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/web/login" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">
            Correo electrónico
          </label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2
                      text-slate-400 text-sm"></i>
            <input type="email" name="email" required
                   placeholder="correo@uchile.cl"
                   class="w-full pl-9 pr-4 py-2.5 border border-slate-200 rounded-xl
                          text-sm focus:outline-none focus:ring-2 focus:ring-blue-400
                          text-slate-800 placeholder-slate-400" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">
            Contraseña
          </label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2
                      text-slate-400 text-sm"></i>
            <input type="password" name="password" required
                   placeholder="••••••••"
                   class="w-full pl-9 pr-4 py-2.5 border border-slate-200 rounded-xl
                          text-sm focus:outline-none focus:ring-2 focus:ring-blue-400
                          text-slate-800" />
          </div>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                       py-3 rounded-xl transition-colors text-sm shadow-sm mt-2
                       flex items-center justify-center gap-2">
          <i class="fa-solid fa-right-to-bracket"></i>
          Iniciar sesión
        </button>
      </form>

      <div class="mt-5 text-center">
        <p class="text-xs text-slate-500">
          ¿No tienes cuenta?
          <a href="/web/registro"
             class="text-blue-600 hover:underline font-semibold ml-1">Regístrate</a>
        </p>
      </div>

      <!-- Credenciales demo -->
      <div class="mt-5 p-3 bg-blue-50 rounded-xl text-xs text-blue-700">
        <p class="font-semibold mb-1">
          <i class="fa-solid fa-circle-info mr-1"></i>Usuarios demo
        </p>
        <p>Admin: <code>admin@campus.cl</code> / <code>admin123</code></p>
        <p>Est:&nbsp;&nbsp;&nbsp;<code>estudiante@campus.cl</code> / <code>est123</code></p>
      </div>
    </div>

    <p class="text-center text-blue-400 text-xs mt-6">
      EL-4203 · Programación Avanzada
    </p>
  </div>
</body>
</html>
