<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro – CampusRadar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900
             flex items-center justify-center px-4 py-8">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16
                  bg-blue-600 rounded-2xl shadow-xl mb-4">
        <i class="fa-solid fa-radar text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">CampusRadar</h1>
      <p class="text-blue-300 text-sm mt-1">Crea tu cuenta</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h2 class="text-xl font-bold text-slate-800 mb-1">Nueva cuenta</h2>
      <p class="text-slate-500 text-sm mb-6">Únete a la comunidad CampusRadar</p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3
                  text-sm mb-4 flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation"></i>{{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/web/registro" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Nombre</label>
          <input type="text" name="nombre" required minlength="2"
                 placeholder="Tu nombre completo"
                 class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400 text-slate-800"/>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Email</label>
          <input type="email" name="email" required
                 placeholder="correo@uchile.cl"
                 class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400 text-slate-800"/>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Contraseña</label>
          <input type="password" name="password" required minlength="6"
                 placeholder="Mínimo 6 caracteres"
                 class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400 text-slate-800"/>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Rol</label>
          <select name="rol"
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm
                         focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white text-slate-700">
            <option value="estudiante">Estudiante</option>
            <option value="moderador">Moderador</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                       py-3 rounded-xl transition-colors text-sm shadow-sm mt-2">
          <i class="fa-solid fa-user-plus mr-2"></i>Crear cuenta
        </button>
      </form>

      <div class="mt-5 text-center">
        <p class="text-xs text-slate-500">
          ¿Ya tienes cuenta?
          <a href="/web/login" class="text-blue-600 hover:underline font-semibold ml-1">
            Iniciar sesión
          </a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
